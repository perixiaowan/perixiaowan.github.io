# Featured Tags
featured-tags: true                     # whether or not using Feature-Tags
featured-condition-size: 1              # A tag will be featured if the size of it is more than this condition value



# Directory  目录设置
source_dir: source          #资源文件夹  默认是source
public_dir: public        #公共文件夹  默认是public
tag_dir: tags         #标签文件夹  默认是tags
archive_dir: archives     #档案文件夹  默认是archives
category_dir: categories    #分类文件夹  默认是categories
code_dir: downloads/code    #代码文件夹  默认是downloads/code
i18n_dir: :lang         #国际化文件夹 默认跟language相同
skip_render:            #不需要渲染的文件夹或文件夹放在【】中

# Writing  文章写作选项
new_post_name: :year/:month/:day/:title.md # File name of new posts
default_layout: post    #默认布局模板
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 1    #Transform titles into:value(1) lower case;value(2) upper case.默认0 
render_drafts: false  #display drafts?
post_asset_folder: true   #Enable the Asset folder
relative_link: false      #Make links relative to the root folder?
future: true              #display future posts
highlight:        #高亮显示
  enable: true      #默认开启
  line_number: true   #显示行号，默认开启
  auto_detect: false
  tab_replace:

# Category & Tag    #分类和标签
default_category: others  #默认分类名称
category_map: 
tag_map:  

# Date / Time format   #日期/时间格式
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD       
time_format: HH:mm:ss

# Pagination  分页信息
## Set per_page to 0 to disable pagination
per_page: 10        #每页显示数量，设置为0表示不启用分页
pagination_dir: page      #分页文件夹名称

