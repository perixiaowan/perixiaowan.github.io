	<script type="text/javascript">
        function fenxiang(){
            $(".next").show();
        }

		var SHAKE_THRESHOLD = 3000;
		var last_update = 0;
		var random = 0;
		var x = y = z = last_x = last_y = last_z = 0;
		
		if (window.DeviceMotionEvent) {
			window.addEventListener('devicemotion', deviceMotionHandler, false);
		} else {
			alert('not support mobile event');
		}
        
	    var int=self.setInterval("removeClassShake()",2000);
        var count = 0;
        function removeClassShake(){
            count++;
            console.log("removeClassShake:"+count);
            
            $("#shake").removeClass("shake-slow");
            $("#farm_introduction").removeClass("fmpg1");
            
        }

		function deviceMotionHandler(eventData) {
         
        /*    shake();*/
			var acceleration = eventData.accelerationIncludingGravity;  
			var curTime = new Date().getTime(); 
            
			random = Math.ceil(Math.random()*5); //取1~5随机整数
			if ((curTime - last_update) > 100) {
				var diffTime = curTime - last_update;  
				last_update = curTime;
				x = acceleration.x;
				y = acceleration.y;
				z = acceleration.z;
				var speed = Math.abs(x + y + z - last_x - last_y - last_z) / diffTime * 10000;
				
                
                if (speed > SHAKE_THRESHOLD) {
                    /*shake();*/
                    $("#shake").addClass("shake-slow");
                    var indexfarm = "img/farm_"+random+".png";
                    $("#farm_introduction").addClass("fmpg1").attr("src",indexfarm);
                    
                   /* $(".fmp1").css("backgroundImage","url("+indexfarm+")"); */
                    fenxiang();
                    
                }  
                /*$("#shake-slow").removeClass("shake-slow");*/
				last_x = x;
				last_y = y;
				last_z = z;

			}
		} 
		

	</script>
